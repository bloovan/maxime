<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover,
               maximum-scale=1.0, user-scalable=no">
<title>Maxime</title>

<style>
/* ================= BASIS ================= */
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  touch-action: manipulation;
}

button {
  font-size: 20px;
  padding: 14px;
  border-radius: 16px;
  border: none;
  cursor: pointer;
}

.primary { background: #1F6FEB; color: white; }
.gray { background: #777; color: white; }

.screen {
  display: none;
  height: 100%;
}

/* ================= MAIN ================= */
#screen-main {
  display: flex;
  flex-direction: column;
  height: 100%;
}

#display {
  background: white;
  padding: 14px 16px;
  font-size: 28px;
  line-height: 1.3;
  border-bottom: 3px solid #ccc;
  user-select: none;
}

/* ================= MIDDLE ================= */
.middle {
  flex: 1;
  display: grid;
  grid-template-columns: 30% 70%;
  overflow: hidden;
}

/* VASTE WOORDEN */
.phrases {
  background: #eef2f5;
  padding: 10px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.phrases button {
  width: 100%;
  background: #2E7D32;
  color: white;
  font-size: 20px;
  padding: 18px;
}

/* ================= TOETSENBORD ================= */
.keyboard {
  padding: 10px;
  display: grid;
  grid-template-columns: 70% 30%;
  gap: 10px;
}

/* LETTERS */
.letterboard {
  display: grid;
  gap: 10px;
}

.letter-row {
  display: flex;
  gap: 10px;
}

.keygroup {
  flex: 1;
  padding: 10px;
  border-radius: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
}

.keygroup button {
  min-width: 44px;
  min-height: 44px;
  font-size: 20px;
}

/* kleuren */
.k-abc  { background: #c8e6c9; }
.k-def  { background: #bbdefb; }
.k-ghi  { background: #dcedc8; }
.k-jkl  { background: #d1c4e9; }
.k-mno  { background: #ffe0b2; }
.k-pqrs { background: #b2dfdb; }
.k-tuv  { background: #ffccbc; }
.k-wxyz { background: #e6ee9c; }

/* ================= SPATIE ================= */
.space-key {
  margin-top: 12px;
}

.space-key button {
  width: 100%;
  font-size: 24px;
  padding: 22px;
  border-radius: 22px;
  background: #424242;
  color: white;
}

/* ================= CIJFERS ================= */
.digitboard {
  display: grid;
  gap: 10px;
}

.digit-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
}

.digitboard button {
  min-height: 60px;
  font-size: 20px;
  background: #555;
  color: white;
}

/* ================= ACTIES (vast onderaan) ================= */
.actions {
  position: sticky;
  bottom: 0;
  background: #e0e0e0;
  padding: 10px;
  display: flex;
  justify-content: space-around;
  gap: 10px;
  border-top: 3px solid #ccc;
}

/* ================= BEHEER ================= */
.manage {
  display: none;
  background: #eeeeee;
  padding: 8px;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}

.manage.show {
  display: flex;
}

/* ============ TABLET-ONLY VERFIJNING ============ */
@media (hover: none) and (pointer: coarse) {
  button {
    font-size: 22px;
  }

  .phrases button {
    padding: 22px;
  }

  .actions button {
    flex: 1;
    font-size: 22px;
    padding: 18px;
  }
}
</style>
</head>

<body>

<div id="screen-main" class="screen" style="display:block">

  <div id="display">...</div>

  <div class="middle">
    <div class="phrases" id="phrases"></div>

    <div class="keyboard">
      <div>
        <div class="letterboard">
          <div class="letter-row">
            <div class="keygroup k-abc"><button>A</button><button>B</button><button>C</button></div>
            <div class="keygroup k-def"><button>D</button><button>E</button><button>F</button></div>
          </div>
          <div class="letter-row">
            <div class="keygroup k-ghi"><button>G</button><button>H</button><button>I</button></div>
            <div class="keygroup k-jkl"><button>J</button><button>K</button><button>L</button></div>
            <div class="keygroup k-mno"><button>M</button><button>N</button><button>O</button></div>
          </div>
          <div class="letter-row">
            <div class="keygroup k-pqrs"><button>P</button><button>Q</button><button>R</button><button>S</button></div>
            <div class="keygroup k-tuv"><button>T</button><button>U</button><button>V</button></div>
            <div class="keygroup k-wxyz"><button>W</button><button>X</button><button>Y</button><button>Z</button></div>
          </div>
        </div>

        <div class="space-key">
          <button>Spatie</button>
        </div>
      </div>

      <div class="digitboard">
        <div class="digit-row"><button>1</button><button>2</button><button>3</button></div>
        <div class="digit-row"><button>4</button><button>5</button><button>6</button></div>
        <div class="digit-row"><button>7</button><button>8</button><button>9</button></div>
        <div class="digit-row"><button>0</button></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary">Spreek</button>
    <button class="gray">Terug</button>
    <button class="gray">Wissen</button>
  </div>

  <div class="manage" id="manage">
    <button>Profielen</button>
    <button>+ Vast woord</button>
    <button class="gray">Verwijder woord</button>
  </div>

</div>

<script>
let text="";
const display=document.getElementById("display");

function updateDisplay(){ display.textContent=text||"..."; }
function addText(t){ text+=t;updateDisplay(); }

document.querySelectorAll("button").forEach(b=>{
  b.onclick=()=>{
    if(b.textContent==="Spatie") addText(" ");
    else if(/^[A-Z0-9]$/.test(b.textContent)) addText(b.textContent.toLowerCase());
  }
});

updateDisplay();
</script>

</body>
</html>
