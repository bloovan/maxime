<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maxime ✅ TEST</title>

<meta name="theme-color" content="#1F6FEB">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

.screen {
  display: none;
  height: 100%;
  flex-direction: column;
}

#display {
  background: white;
  padding: 16px;
  font-size: 28px;
  border-bottom: 2px solid #ddd;
  min-height: 90px;
  overflow-y: auto;
}

.actions {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-around;
  background: #eaeaea;
  padding: 8px;
}

button {
  font-size: 18px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin: 4px;
}

.primary { background: #1F6FEB; color: white; }
.gray { background: #888; color: white; }

.phrases {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  padding: 8px;
}

.phrases button {
  background: #2E7D32;
  color: white;
  font-size: 20px;
}

/* Beheer vaste woorden */
.manage {
  padding: 8px;
  text-align: center;
}

select {
  font-size: 16px;
  padding: 6px;
  width: 90%;
}

/* ================= TOETSENBORD ================= */
.keyboard {
  display: none;
  padding: 10px;
}

.keyboard.visible {
  display: block;
}

.digits {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 10px;
}

.digits button {
  background: #666;
  color: white;
}

.letters {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.keygroup {
  border-radius: 14px;
  padding: 8px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 6px;
}

.k-abc  { background: #c8e6c9; }
.k-def  { background: #bbdefb; }
.k-ghi  { background: #dcedc8; }
.k-jkl  { background: #d1c4e9; }
.k-mno  { background: #ffe0b2; }
.k-pqrs { background: #b2dfdb; }
.k-tuv  { background: #ffccbc; }
.k-wxyz { background: #e6ee9c; }

.keygroup button {
  font-size: 22px;
  padding: 12px;
}

.space {
  grid-column: span 3;
}

.profile-row {
  display: flex;
  justify-content: space-between;
  margin: 10px;
}
.profile-row button:last-child {
  background: #c62828;
  color: white;
}

/* ✅ smartphone optimalisatie */
@media (max-width: 600px) {
  body {
    overflow: hidden;
  }
  .phrases {
    max-height: 100px;
    overflow-y: auto;
  }
}
</style>
</head>

<body>

<div id="screen-profiles" class="screen"></div>

<div id="screen-main" class="screen">

  <div id="display">...</div>

  <div class="actions">
    <button class="primary" onclick="speak()">Spreek</button>
    <button class="gray" onclick="backspace()">Terug</button>
    <button class="gray" onclick="clearText()">Wissen</button>
    <button onclick="toggleKeyboard()">⌨️ Toetsenbord</button>
    <button onclick="addPhrase()">+ Vast woord</button>
    <button onclick="goProfiles()">Profielen</button>
  </div>

  <div class="phrases" id="phrases"></div>

  <div class="manage">
    <select id="phraseSelect"></select><br>
    <button onclick="removeSelectedPhrase()">Verwijder geselecteerd woord</button>
  </div>

  <div class="keyboard">
    <div class="digits">
      <button>1</button><button>2</button><button>3</button><button>4</button><button>5</button>
      <button>6</button><button>7</button><button>8</button><button>9</button><button>0</button>
    </div>

    <div class="letters">
      <div class="keygroup k-abc"><button>A</button><button>B</button><button>C</button></div>
      <div class="keygroup k-def"><button>D</button><button>E</button><button>F</button></div>
      <div class="keygroup k-ghi"><button>G</button><button>H</button><button>I</button></div>
      <div class="keygroup k-jkl"><button>J</button><button>K</button><button>L</button></div>
      <div class="keygroup k-mno"><button>M</button><button>N</button><button>O</button></div>
      <div class="keygroup k-pqrs"><button>P</button><button>Q</button><button>R</button><button>S</button></div>
      <div class="keygroup k-tuv"><button>T</button><button>U</button><button>V</button></div>
      <div class="keygroup k-wxyz"><button>W</button><button>X</button><button>Y</button><button>Z</button></div>
      <div class="keygroup space"><button>Spatie</button></div>
    </div>
  </div>

</div>

<script defer>
/* ✅ VEILIGE DOM KOPPELING */
const display = document.getElementById("display");
const keyboard = document.querySelector(".keyboard");

let profiles = JSON.parse(localStorage.getItem("profiles")) || [];
let activeProfile = null;
let text = "";

const BASE_PHRASES = ["Ik heb ", "Ik wil ", "honger ", "dorst ", "Dankjewel "];

/* Screens */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "flex";
}

/* Profielen */
function renderProfiles(){
  const div = document.getElementById("screen-profiles");
  div.innerHTML = "<h2>Kies profiel</h2>";

  profiles.forEach(p => {
    const row = document.createElement("div");
    row.className = "profile-row";

    const b = document.createElement("button");
    b.textContent = p.name;
    b.onclick = () => loadProfile(p.id);

    const d = document.createElement("button");
    d.textContent = "X";
    d.onclick = () => deleteProfile(p.id);

    row.append(b, d);
    div.appendChild(row);
  });

  const add = document.createElement("button");
  add.textContent = "+ Nieuw profiel";
  add.onclick = addProfile;
  div.appendChild(add);
}

function addProfile(){
  const name = prompt("Naam profiel:");
  if(!name) return;
  profiles.push({ id: Date.now(), name, phrases: [...BASE_PHRASES] });
  save(); renderProfiles();
}

function deleteProfile(id){
  if(!confirm("Profiel verwijderen?")) return;
  profiles = profiles.filter(p => p.id !== id);
  save(); renderProfiles();
}

function loadProfile(id){
  activeProfile = profiles.find(p => p.id === id);
  text = "";
  keyboard.classList.remove("visible");
  renderPhrases();
  updateSelect();
  updateDisplay();
  showScreen("screen-main");
}

function goProfiles(){ showScreen("screen-profiles"); }
function save(){ localStorage.setItem("profiles", JSON.stringify(profiles)); }

/* Tekst */
function updateDisplay(){
  display.textContent = text || "...";
  display.scrollTop = display.scrollHeight;
}
function addText(t){
  text += t;
  updateDisplay();
  keyboard.classList.add("visible");
}
function clearText(){ text=""; updateDisplay(); }
function backspace(){ text = text.slice(0, -1); updateDisplay(); }

/* Spraak */
function speak(){
  if(!text) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "nl-NL";
  speechSynthesis.speak(u);
}

/* Vaste woorden */
function renderPhrases(){
  const div = document.getElementById("phrases");
  div.innerHTML = "";
  activeProfile.phrases.forEach(p => {
    const b = document.createElement("button");
    b.textContent = p.trim();
    b.onclick = () => addText(p);
    div.appendChild(b);
  });
}

function addPhrase(){
  const p = prompt("Nieuw vast woord:");
  if(!p) return;
  activeProfile.phrases.push(p + " ");
  save(); renderPhrases(); updateSelect();
}

function updateSelect(){
  const sel = document.getElementById("phraseSelect");
  sel.innerHTML = "";
  activeProfile.phrases.forEach((p,i)=>{
    const o = document.createElement("option");
    o.value = i;
    o.textContent = p.trim();
    sel.appendChild(o);
  });
}

function removeSelectedPhrase(){
  const sel = document.getElementById("phraseSelect");
  if(sel.value === "") return;
  if(!confirm("Geselecteerd vast woord verwijderen?")) return;
  activeProfile.phrases.splice(sel.value,1);
  save(); renderPhrases(); updateSelect();
}

/* Toetsenbord */
function toggleKeyboard(){
  keyboard.classList.toggle("visible");
}

document.querySelectorAll(".keyboard button").forEach(b => {
  b.onclick = () => {
    const v = b.textContent;
    if(v === "Spatie") addText(" ");
    else if(!isNaN(v)) addText(v);
    else addText(v.toLowerCase());
  };
});

/* Start */
renderProfiles();
showScreen("screen-profiles");
</script>

</body>
</html>
