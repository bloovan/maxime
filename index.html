<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maxime</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

button {
  font-size: 18px;
  padding: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.primary { background: #1F6FEB; color: white; }
.gray { background: #777; color: white; }

.screen { display: none; height: 100%; }

#screen-profiles { padding: 20px; }

.profile-title {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.profile-card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
}

.profile-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #c62828;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.profile-add {
  margin-top: 20px;
  width: 100%;
  font-size: 22px;
  background: #1F6FEB;
  color: white;
}

/* MAIN */
#screen-main {
  display: flex;
  flex-direction: column;
  height: 100%;
}

#display {
  background: white;
  padding: 10px 14px;
  font-size: 26px;
  border-bottom: 2px solid #ccc;
}

.middle {
  flex: 1;
  display: grid;
  grid-template-columns: 30% 70%;
}

.phrases {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.phrases button {
  width: 100%;
  background: #2E7D32;
  color: white;
}

.keyboard {
  padding: 8px;
}

.keygroup {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.space-key button {
  width: 100%;
  font-size: 20px;
  background: linear-gradient(90deg,#42a5f5,#66bb6a);
  color: white;
}

.actions {
  background: #e0e0e0;
  padding: 8px;
  display: flex;
  gap: 8px;
  justify-content: space-around;
}

/* kleine visuele feedback bij hold */
button.holding {
  opacity: 0.6;
}

/* ================= KLEURRIJK TOETSENBORD ================= */

/* Algemene toets-stijl */
.keyboard button {
  font-weight: bold;
  color: #1a1a1a;
}



/* CIJFERS 0–9 */
.keyboard button:nth-child(n+27):nth-child(-n+36) {
  background: #90caf9;
  color: #0d47a1;
  font-size: 18px;
}

/* ================= ALS + DEMENTIE KLEUREN ================= */

/* Basis voor alle toetsen */
.keyboard button {
  font-weight: bold;
  color: #1a1a1a;
}

/* KLINKERS */
.keyboard button.vowel {
  background-color: #fff3b0; /* zacht geel */
}

/* MEDEKLINKERS */
.keyboard button.consonant {
  background-color: #cfe3f7; /* licht blauw */
}

/* CIJFERS */
.keyboard button.digit {
  background-color: #d9f2d9; /* licht groen */
  font-size: 18px;
}

/* Spatie blijft opvallend */
.space-key button {
  background: linear-gradient(90deg,#4fc3f7,#81c784);
  color: #ffffff;
}

/* HOLD visuele feedback (blijft) */
button.holding {
  filter: brightness(85%);
}
</style>
</head>

<body>

<!-- PROFIELEN -->
<div id="screen-profiles" class="screen">
  <div class="profile-title">Kies profiel</div>
  <div id="profileGrid" class="profile-grid"></div>
  <button class="profile-add" onclick="addProfile()">Nieuw profiel</button>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div id="display">...</div>

  <div class="middle">
    <div id="phrases" class="phrases"></div>

    <div class="keyboard">
      <div class="keygroup">
        <button>A</button><button>B</button><button>C</button>
        <button>D</button><button>E</button><button>F</button>
        <button>G</button><button>H</button><button>I</button>
        <button>J</button><button>K</button><button>L</button>
        <button>M</button><button>N</button><button>O</button>
        <button>P</button><button>Q</button><button>R</button>
        <button>S</button><button>T</button><button>U</button>
        <button>V</button><button>W</button><button>X</button>
        <button>Y</button><button>Z</button>
        <button>1</button><button>2</button><button>3</button>
        <button>4</button><button>5</button><button>6</button>
        <button>7</button><button>8</button><button>9</button>
        <button>0</button>
      </div>

      <div class="space-key">
        <button>Spatie</button>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="speak()">Spreek</button>
    <button class="gray" onclick="backspace()">Wis 1 letter</button>
    <button class="gray" onclick="clearText()">Wis alles</button>
    <button onclick="goManage()">Beheer</button>
    <button onclick="goProfiles()">Profielen</button>
  </div>
</div>

<!-- BEHEER -->
<div id="screen-manage" class="screen">
  <div style="padding:20px;">
    <h2>Beheer profiel: <span id="manageProfileName"></span></h2>
    <button class="primary" onclick="addPhrase()">+ Vast woord</button>
    <br><br>
    <select id="phraseSelect" style="width:100%; font-size:18px; padding:10px;"></select>
    <br><br>
    <button class="gray" onclick="removeSelectedPhrase()">Verwijder woord</button>
    <br><br><hr><br>
    <button onclick="goMain()">Terug</button>
    <button onclick="goProfiles()">Profielen</button>
  </div>
</div>

<script>
/* ================= DATA ================= */
let profiles = [{ id: 1, name: "Eddy", phrases: ["Ik heb ", "Ik wil "] }];
let activeProfile = null;
let text = "";

/* ================= NAV ================= */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.style.display="none");
  document.getElementById(id).style.display="block";
}
function goProfiles(){ activeProfile=null; showScreen("screen-profiles"); }
function goMain(){ if(activeProfile) showScreen("screen-main"); }
function goManage(){
  if(!activeProfile) return;
  manageProfileName.textContent = activeProfile.name;
  updateSelect();
  showScreen("screen-manage");
}

/* ================= PROFIELEN ================= */
function renderProfiles(){
  profileGrid.innerHTML="";
  profiles.forEach(p=>{
    const c=document.createElement("div");
    c.className="profile-card";
    c.textContent=p.name;
    c.onclick=()=>loadProfile(p.id);

    const d=document.createElement("button");
    d.className="profile-delete";
    d.textContent="×";
    d.onclick=(e)=>{
      e.stopPropagation();
      deleteProfile(p.id);
    };
    c.appendChild(d);
    profileGrid.appendChild(c);
  });
}
function addProfile(){
  const n=prompt("Naam profiel:");
  if(!n) return;
  profiles.push({id:Date.now(), name:n, phrases:[]});
  renderProfiles();
}
function deleteProfile(id){
  profiles = profiles.filter(p => p.id!==id);
  renderProfiles();
}
function loadProfile(id){
  activeProfile = profiles.find(p=>p.id===id);
  text="";
  updateDisplay();
  renderPhrases();
  showScreen("screen-main");
}

/* ================= TEKST ================= */
const display = document.getElementById("display");
function updateDisplay(){ display.textContent = text || "..."; }
function addText(t){ text += t; updateDisplay(); }
function backspace(){ text = text.slice(0,-1); updateDisplay(); }
function clearText(){ text=""; updateDisplay(); }
function speak(){
  if(!text) return;
  speechSynthesis.cancel();
  speechSynthesis.speak(new SpeechSynthesisUtterance(text));
}

/* ================= WOORDEN ================= */
const phrasesDiv=document.getElementById("phrases");
function renderPhrases(){
  phrasesDiv.innerHTML="";
  activeProfile.phrases.forEach(p=>{
    const b=document.createElement("button");
    b.textContent=p.trim();
    setupHold(b, ()=>addText(p));
    phrasesDiv.appendChild(b);
  });
}
function addPhrase(){
  const p=prompt("Nieuw vast woord:");
  if(!p) return;
  activeProfile.phrases.push(p+" ");
  renderPhrases();
  updateSelect();
}
function updateSelect(){
  phraseSelect.innerHTML="";
  activeProfile.phrases.forEach((p,i)=>{
    const o=document.createElement("option");
    o.value=i; o.textContent=p.trim();
    phraseSelect.appendChild(o);
  });
}
function removeSelectedPhrase(){
  if(phraseSelect.value==="") return;
  activeProfile.phrases.splice(phraseSelect.value,1);
  renderPhrases();
  updateSelect();
}

/* ================= HOLD LOGICA (ALLEEN TOETSEN & PHRASES) ================= */
const HOLD_TIME = 600;

function setupHold(button, action){
  let timer=null;
  let fired=false;

  const start = e=>{
    e.preventDefault();
    fired=false;
    button.classList.add("holding");
    timer=setTimeout(()=>{
      fired=true;
      button.classList.remove("holding");
      action();
    }, HOLD_TIME);
  };
  const cancel = ()=>{
    clearTimeout(timer);
    button.classList.remove("holding");
  };

  button.addEventListener("mousedown", start);
  button.addEventListener("mouseup", cancel);
  button.addEventListener("mouseleave", cancel);

  button.addEventListener("touchstart", start, {passive:false});
  button.addEventListener("touchend", cancel);
  button.addEventListener("touchcancel", cancel);

  button.addEventListener("click", e=>{
    e.preventDefault();
    e.stopPropagation();
  });
}

/* ================= TOETSENBORD ================= */
document.querySelectorAll(".keyboard button").forEach(b=>{
  const t=b.textContent;
  if(t==="Spatie"){
    setupHold(b,()=>addText(" "));
  } else if(/^[A-Z0-9]$/.test(t)){
    setupHold(b,()=>addText(t.toLowerCase()));
  }
});

/* ================= START ================= */
renderProfiles();
showScreen("screen-profiles");

/* ================= TOETS-KLEUR LOGICA ================= */

document.querySelectorAll(".keyboard button").forEach(btn => {
  const t = btn.textContent;

  if (/^[AEIOU]$/.test(t)) {
    btn.classList.add("vowel");
  } 
  else if (/^[A-Z]$/.test(t)) {
    btn.classList.add("consonant");
  } 
  else if (/^[0-9]$/.test(t)) {
    btn.classList.add("digit");
  }
});

</script>

</body>
</html>
