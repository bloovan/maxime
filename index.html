<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maxime</title>

<style>
/* ================= BASIS ================= */
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

button {
  font-size: 18px;
  padding: 10px;
  border-radius: 12px;
  border: none;
}

.primary { background: #1F6FEB; color: white; }
.gray { background: #777; color: white; }

/* ================= SCREENS ================= */
.screen {
  display: none;
  height: 100%;
}

/* ================= ROTATE OVERLAY ================= */
#rotate-warning {
  position: fixed;
  inset: 0;
  background: #1F6FEB;
  color: white;
  display: none;
  z-index: 9999;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 22px;
  padding: 20px;
}

/* ================================================= */
/* ================= PROFIELSCHERM ================= */
/* ================================================= */
#screen-profiles {
  padding: 20px;
}

.profile-title {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
}

.profile-card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
  position: relative;
  cursor: pointer;
}

.profile-emoji {
  font-size: 48px;
}

.profile-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #c62828;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 16px;
  padding: 0;
}

.profile-add {
  margin-top: 20px;
  font-size: 22px;
  padding: 14px;
  background: #1F6FEB;
  color: white;
  width: 100%;
}

/* ================================================= */
/* ================= HOOFDSCHERM ================= */
/* ================================================= */
#screen-main {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ✅ DISPLAY ALTIJD ZICHTBAAR */
#display {
  background: white;
  padding: 14px;
  font-size: 26px;
  border-bottom: 2px solid #ccc;
  min-height: 70px;
  max-height: 110px;
  overflow-y: auto;
  flex-shrink: 0;
}

/* ===== MIDDEN ===== */
.middle {
  flex: 1;
  display: grid;
  grid-template-columns: 30% 70%;
  overflow: hidden;
}

/* ===== VASTE WOORDEN ===== */
.phrases {
  background: #eef2f5;
  padding: 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.phrases button {
  width: 100%;
  background: #2E7D32;
  color: white;
  font-size: 18px;
}

/* ================================================= */
/* ========== COMPACTE LETTERGROEPEN =============== */
/* ================================================= */
.keyboard {
  padding: 8px;
  overflow-y: auto;
}

.letters {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

.keygroup {
  border-radius: 14px;
  padding: 6px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 4px;
}

.keygroup button {
  min-width: 34px;
  padding: 6px;
  font-size: 16px;
}

/* kleuren */
.k-abc  { background: #c8e6c9; }
.k-def  { background: #bbdefb; }
.k-ghi  { background: #dcedc8; }
.k-jkl  { background: #d1c4e9; }
.k-mno  { background: #ffe0b2; }
.k-pqrs { background: #b2dfdb; }
.k-tuv  { background: #ffccbc; }
.k-wxyz { background: #e6ee9c; }

.space {
  grid-column: span 4;
}

/* ===== ACTIES ===== */
.actions {
  display: flex;
  justify-content: space-around;
  background: #e0e0e0;
  padding: 8px;
  flex-shrink: 0;
}

/* ===== BEHEER ===== */
.manage {
  background: #dcdcdc;
  padding: 8px;
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-shrink: 0;
}

.manage select {
  font-size: 16px;
  padding: 6px;
}
</style>
</head>

<body>

<div id="rotate-warning">
  Draai je toestel horizontaal<br>of gebruik een tablet
</div>

<!-- PROFIEL -->
<div id="screen-profiles" class="screen">
  <div class="profile-title">👤 Kies profiel</div>
  <div id="profileGrid" class="profile-grid"></div>
  <button class="profile-add" onclick="addProfile()">➕ Nieuw profiel</button>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">

  <div id="display">...</div>

  <div class="middle">
    <div class="phrases" id="phrases"></div>

    <div class="keyboard">
      <div class="letters">
        <div class="keygroup k-abc"><button>A</button><button>B</button><button>C</button></div>
        <div class="keygroup k-def"><button>D</button><button>E</button><button>F</button></div>
        <div class="keygroup k-ghi"><button>G</button><button>H</button><button>I</button></div>
        <div class="keygroup k-jkl"><button>J</button><button>K</button><button>L</button></div>
        <div class="keygroup k-mno"><button>M</button><button>N</button><button>O</button></div>
        <div class="keygroup k-pqrs"><button>P</button><button>Q</button><button>R</button><button>S</button></div>
        <div class="keygroup k-tuv"><button>T</button><button>U</button><button>V</button></div>
        <div class="keygroup k-wxyz"><button>W</button><button>X</button><button>Y</button><button>Z</button></div>
        <div class="keygroup space"><button>Spatie</button></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="speak()">Spreek</button>
    <button class="gray" onclick="backspace()">Terug</button>
    <button class="gray" onclick="clearText()">Wissen</button>
    <button onclick="addPhrase()">+ Vast woord</button>
    <button onclick="goProfiles()">Profielen</button>
  </div>

  <div class="manage">
    <select id="phraseSelect"></select>
    <button class="gray" onclick="removeSelectedPhrase()">Verwijder woord</button>
  </div>
</div>

<script>
/* ================= ORIENTATIE ================= */
function checkOrientation() {
  const isPhone = window.innerWidth < 800;
  const portrait = window.innerHeight > window.innerWidth;
  document.getElementById("rotate-warning").style.display =
    (isPhone && portrait) ? "flex" : "none";
}
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);

/* ================= SCHERMEN ================= */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.style.display="none");
  document.getElementById(id).style.display="block";
}

/* ================= DATA ================= */
const display=document.getElementById("display");
let profiles=[{id:1,name:"Maxime",phrases:["Ik heb ","Ik wil ","Dankjewel "]}];
let activeProfile=null;
let text="";
const EMOJIS=["😊","👧","👦","🧒","🐶","🐱","⭐","❤️"];

/* ================= PROFILES ================= */
function renderProfiles(){
  const g=document.getElementById("profileGrid");
  g.innerHTML="";
  profiles.forEach((p,i)=>{
    const c=document.createElement("div");
    c.className="profile-card";
    c.onclick=()=>loadProfile(p.id);

    const e=document.createElement("div");
    e.className="profile-emoji";
    e.textContent=EMOJIS[i%EMOJIS.length];

    const n=document.createElement("div");
    n.textContent=p.name;

    const d=document.createElement("button");
    d.className="profile-delete";
    d.textContent="🗑️";
    d.onclick=(ev)=>{
      ev.stopPropagation();
      deleteProfile(p.id);
    };

    c.append(e,n,d);
    g.appendChild(c);
  });
}

function addProfile(){
  const n=prompt("Naam profiel:");
  if(!n)return;
  profiles.push({id:Date.now(),name:n,phrases:["Ik heb ","Ik wil "]});
  renderProfiles();
}

function deleteProfile(id){
  if(!confirm("Profiel verwijderen?"))return;
  profiles=profiles.filter(p=>p.id!==id);
  renderProfiles();
}

function loadProfile(id){
  activeProfile=profiles.find(p=>p.id===id);
  text=""; updateDisplay(); renderPhrases(); updateSelect();
  showScreen("screen-main");
}

function goProfiles(){showScreen("screen-profiles");}

/* ================= TEKST ================= */
function updateDisplay(){display.textContent=text||"...";}
function addText(t){text+=t;updateDisplay();}
function backspace(){text=text.slice(0,-1);updateDisplay();}
function clearText(){text="";updateDisplay();}
function speak(){
  if(!text)return;
  const u=new SpeechSynthesisUtterance(text);
  u.lang="nl-NL"; speechSynthesis.speak(u);
}

/* ================= WOORDEN ================= */
function renderPhrases(){
  const d=document.getElementById("phrases"); d.innerHTML="";
  activeProfile.phrases.forEach(p=>{
    const b=document.createElement("button");
    b.textContent=p.trim();
    b.onclick=()=>addText(p);
    d.appendChild(b);
  });
}
function addPhrase(){
  const p=prompt("Nieuw vast woord:");
  if(!p)return;
  activeProfile.phrases.push(p+" "); renderPhrases(); updateSelect();
}
function updateSelect(){
  const s=document.getElementById("phraseSelect"); s.innerHTML="";
  activeProfile.phrases.forEach((p,i)=>{
    const o=document.createElement("option");
    o.value=i; o.textContent=p.trim(); s.appendChild(o);
  });
}
function removeSelectedPhrase(){
  const s=document.getElementById("phraseSelect");
  activeProfile.phrases.splice(s.value,1);
  renderPhrases(); updateSelect();
}

/* ================= KEYBOARD ================= */
document.querySelectorAll(".keyboard button").forEach(b=>{
  b.onclick=()=>{
    const v=b.textContent;
    if(v==="Spatie") addText(" ");
    else addText(v.toLowerCase());
  };
});

/* start */
renderProfiles();
showScreen("screen-profiles");
checkOrientation();
</script>

</body>
</html>
