<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maxime</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

/* ================= ALGEMEEN ================= */
button {
  font-size: 20px;
  padding: 14px;
  border-radius: 14px;
  border: none;
}
.primary { background: #1F6FEB; color: white; }
.gray { background: #777; color: white; }

/* ================= SCREENS ================= */
.screen {
  display: none;
  height: 100%;
}

/* ================= ROTATE OVERLAY ================= */
#rotate-warning {
  position: fixed;
  inset: 0;
  background: #1F6FEB;
  color: white;
  display: none;
  z-index: 9999;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 26px;
  padding: 24px;
}

/* ================================================= */
/* ================= PROFIELSCHERM ================= */
/* ================================================= */
#screen-profiles {
  padding: 24px;
}

.profile-title {
  text-align: center;
  font-size: 34px;
  margin-bottom: 24px;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.profile-card {
  background: white;
  border-radius: 22px;
  padding: 24px;
  text-align: center;
  font-size: 26px;
  box-shadow: 0 6px 14px rgba(0,0,0,0.15);
  position: relative;
  cursor: pointer;
}

.profile-emoji {
  font-size: 52px;
  margin-bottom: 8px;
}

.profile-delete {
  position: absolute;
  top: 10px;
  right: 10px;
  background: #c62828;
  color: white;
  font-size: 18px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  padding: 0;
}

.profile-add {
  margin-top: 24px;
  font-size: 24px;
  padding: 18px;
  background: #1F6FEB;
  color: white;
  width: 100%;
}

/* ================================================= */
/* ================= HOOFDSCHERM ================= */
/* ================================================= */
#screen-main {
  display: grid;
  grid-template-rows: auto 1fr auto auto;
  height: 100%;
}

/* ===== DISPLAY ===== */
#display {
  background: white;
  padding: 20px;
  font-size: 32px;
  border-bottom: 2px solid #ccc;
  overflow-y: auto;
}

/* ===== MIDDEN ===== */
.middle {
  display: grid;
  grid-template-columns: 30% 70%;
}

/* links: vaste woorden */
.phrases {
  background: #eef2f5;
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.phrases button {
  width: 100%;
  background: #2E7D32;
  color: white;
  font-size: 22px;
}

/* rechts: toetsenbord */
.keyboard {
  padding: 12px;
}

.digits {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 10px;
}
.digits button {
  background: #666;
  color: white;
}

/* ===== LETTERS ===== */
.letters {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}

/* ===== KEYGROUPS ===== */
.keygroup {
  border-radius: 18px;
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
}
.keygroup button {
  font-size: 26px;
}

/* ===== KLEUREN PER LETTERGROEP ===== */
.k-abc  { background: #c8e6c9; }
.k-def  { background: #bbdefb; }
.k-ghi  { background: #dcedc8; }
.k-jkl  { background: #d1c4e9; }
.k-mno  { background: #ffe0b2; }
.k-pqrs { background: #b2dfdb; }
.k-tuv  { background: #ffccbc; }
.k-wxyz { background: #e6ee9c; }

.space {
  grid-column: span 3;
}

/* ===== ACTIES ===== */
.actions {
  display: flex;
  justify-content: space-around;
  background: #e0e0e0;
  padding: 10px;
}

/* ===== BEHEER ===== */
.manage {
  background: #dcdcdc;
  padding: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}
.manage select {
  font-size: 18px;
  padding: 8px;
  min-width: 220px;
}
</style>
</head>

<body>

<div id="rotate-warning">
  Draai je toestel horizontaal<br>of gebruik een tablet
</div>

<!-- PROFIELSCHERM -->
<div id="screen-profiles" class="screen">
  <div class="profile-title">👤 Kies profiel</div>
  <div id="profileGrid" class="profile-grid"></div>
  <button class="profile-add" onclick="addProfile()">➕ Nieuw profiel</button>
</div>

<!-- HOOFDSCHERM -->
<div id="screen-main" class="screen">

  <div id="display">...</div>

  <div class="middle">
    <div class="phrases" id="phrases"></div>

    <div class="keyboard">
      <div class="digits">
        <button>1</button><button>2</button><button>3</button><button>4</button><button>5</button>
        <button>6</button><button>7</button><button>8</button><button>9</button><button>0</button>
      </div>

      <div class="letters">
        <div class="keygroup k-abc"><button>A</button><button>B</button><button>C</button></div>
        <div class="keygroup k-def"><button>D</button><button>E</button><button>F</button></div>
        <div class="keygroup k-ghi"><button>G</button><button>H</button><button>I</button></div>
        <div class="keygroup k-jkl"><button>J</button><button>K</button><button>L</button></div>
        <div class="keygroup k-mno"><button>M</button><button>N</button><button>O</button></div>
        <div class="keygroup k-pqrs"><button>P</button><button>Q</button><button>R</button><button>S</button></div>
        <div class="keygroup k-tuv"><button>T</button><button>U</button><button>V</button></div>
        <div class="keygroup k-wxyz"><button>W</button><button>X</button><button>Y</button><button>Z</button></div>
        <div class="keygroup space"><button>Spatie</button></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" onclick="speak()">Spreek</button>
    <button class="gray" onclick="backspace()">Terug</button>
    <button class="gray" onclick="clearText()">Wissen</button>
    <button onclick="addPhrase()">+ Vast woord</button>
    <button onclick="goProfiles()">Profielen</button>
  </div>

  <div class="manage">
    <select id="phraseSelect"></select>
    <button class="gray" onclick="removeSelectedPhrase()">Verwijder geselecteerd woord</button>
  </div>
</div>

<script>
/* ================= ORIENTATIE ================= */
function checkOrientation() {
  const isPhone = window.innerWidth < 800;
  const portrait = window.innerHeight > window.innerWidth;
  document.getElementById("rotate-warning").style.display =
    (isPhone && portrait) ? "flex" : "none";
}
window.addEventListener("resize", checkOrientation);
window.addEventListener("orientationchange", checkOrientation);

/* ================= SCHERMEN ================= */
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.style.display = "none");
  document.getElementById(id).style.display = "grid";
}

/* ================= DATA ================= */
const display = document.getElementById("display");
let profiles = [
  {id:1,name:"Maxime",phrases:["Ik heb ","Ik wil ","Dankjewel "]}
];
let activeProfile = null;
let text = "";

const EMOJIS = ["😊","👧","👦","🧒","🐶","🐱","⭐","❤️"];

/* ================= PROFIELEN ================= */
function renderProfiles() {
  const grid = document.getElementById("profileGrid");
  grid.innerHTML = "";
  profiles.forEach((p,i) => {
    const card = document.createElement("div");
    card.className = "profile-card";
    card.onclick = () => loadProfile(p.id);

    const emoji = document.createElement("div");
    emoji.className = "profile-emoji";
    emoji.textContent = EMOJIS[i % EMOJIS.length];

    const name = document.createElement("div");
    name.textContent = p.name;

    const del = document.createElement("button");
    del.className = "profile-delete";
    del.textContent = "🗑️";
    del.onclick = (e) => {
      e.stopPropagation();
      deleteProfile(p.id);
    };

    card.append(emoji, name, del);
    grid.appendChild(card);
  });
}

function addProfile() {
  const n = prompt("Naam profiel:");
  if(!n) return;
  profiles.push({id:Date.now(),name:n,phrases:["Ik heb ","Ik wil "]});
  renderProfiles();
}

function deleteProfile(id) {
  if(!confirm("Profiel verwijderen?")) return;
  profiles = profiles.filter(p => p.id !== id);
  renderProfiles();
}

function loadProfile(id) {
  activeProfile = profiles.find(p => p.id === id);
  text = "";
  updateDisplay();
  renderPhrases();
  updateSelect();
  showScreen("screen-main");
}

function goProfiles() {
  showScreen("screen-profiles");
}

/* ================= TEKST & SPRAAK ================= */
function updateDisplay() {
  display.textContent = text || "...";
}
function addText(t) { text += t; updateDisplay(); }
function backspace() { text = text.slice(0,-1); updateDisplay(); }
function clearText() { text = ""; updateDisplay(); }

function speak() {
  if(!text) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang="nl-NL";
  speechSynthesis.speak(u);
}

/* ================= VASTE WOORDEN ================= */
function renderPhrases() {
  const d = document.getElementById("phrases");
  d.innerHTML = "";
  activeProfile.phrases.forEach(p => {
    const b = document.createElement("button");
    b.textContent = p.trim();
    b.onclick = () => addText(p);
    d.appendChild(b);
  });
}

function addPhrase() {
  const p = prompt("Nieuw vast woord:");
  if(!p) return;
  activeProfile.phrases.push(p + " ");
  renderPhrases();
  updateSelect();
}

function updateSelect() {
  const s = document.getElementById("phraseSelect");
  s.innerHTML = "";
  activeProfile.phrases.forEach((p,i) => {
    const o = document.createElement("option");
    o.value = i;
    o.textContent = p.trim();
    s.appendChild(o);
  });
}

function removeSelectedPhrase() {
  const s = document.getElementById("phraseSelect");
  if(s.value === "") return;
  if(!confirm("Geselecteerd vast woord verwijderen?")) return;
  activeProfile.phrases.splice(s.value,1);
  renderPhrases();
  updateSelect();
}

/* ================= TOETSENBORD ================= */
document.querySelectorAll(".keyboard button").forEach(b => {
  b.onclick = () => {
    const v = b.textContent;
    if(v === "Spatie") addText(" ");
    else if(!isNaN(v)) addText(v);
    else addText(v.toLowerCase());
  };
});

/* ================= START ================= */
renderProfiles();
showScreen("screen-profiles");
checkOrientation();
</script>

</body>
</html>
