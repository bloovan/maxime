<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Zorg Communicatie Hybride</title>

<style>
html, body {
  margin:0;
  height:100%;
  font-family:Arial, sans-serif;
  background:#f4f6f8;
}

#display {
  background:white;
  font-size:28px;
  padding:15px;
  min-height:70px;
  border-bottom:3px solid #ccc;
}

.container {
  display:grid;
  grid-template-columns:30% 70%;
  height:calc(100% - 120px);
}

.phrases {
  background:#e8edf2;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.phrases button {
  font-size:20px;
  padding:20px;
  border:none;
  border-radius:16px;
  background:#2e7d32;
  color:white;
}

.keyboard {
  padding:10px;
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}

.key {
  font-size:22px;
  padding:25px;
  border:none;
  border-radius:16px;
  background:#90caf9;
}

.space {
  grid-column:span 6;
  background:#66bb6a;
}

.actions {
  display:flex;
  justify-content:space-around;
  padding:15px;
  background:#e0e0e0;
}

.actions button {
  font-size:18px;
  padding:12px 20px;
  border:none;
  border-radius:12px;
}

.primary { background:#1f6feb; color:white; }
.gray { background:#777; color:white; }

.settings {
  position:fixed;
  bottom:10px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,.2);
  display:none;
}
</style>
</head>

<body>

<div id="display">...</div>

<div class="container">

  <div class="phrases">
    <button class="key" data-text="Ik heb pijn ">Ik heb pijn</button>
    <button class="key" data-text="Ik ben moe ">Ik ben moe</button>
    <button class="key" data-text="Ik wil water ">Water</button>
    <button class="key" data-text="Ik moet naar toilet ">Toilet</button>
  </div>

  <div class="keyboard" id="keyboard"></div>

</div>

<div class="actions">
  <button class="primary" onclick="speak()">Spreek</button>
  <button class="gray" onclick="backspace()">Wis 1</button>
  <button class="gray" onclick="clearText()">Wis alles</button>
  <button onclick="toggleSettings()">? Zorg</button>
</div>

<div class="settings" id="settings">
  <div><strong>Zorginstellingen</strong></div>
  <label>Hold tijd (ms):</label>
  <input type="range" min="300" max="1200" value="600" id="holdSlider">
  <span id="holdValue">600</span> ms
</div>

<script>
let text = "";
let holdTime = 600;
let lastActivation = 0;

const display = document.getElementById("display");
const keyboard = document.getElementById("keyboard");
const holdSlider = document.getElementById("holdSlider");
const holdValue = document.getElementById("holdValue");

holdSlider.oninput = function(){
  holdTime = this.value;
  holdValue.textContent = holdTime;
}

function updateDisplay(){
  display.textContent = text || "...";
}

function addText(t){
  const now = Date.now();
  if(now - lastActivation < 800) return; // anti-dubbelklik
  lastActivation = now;
  text += t;
  updateDisplay();
}

function backspace(){
  text = text.slice(0,-1);
  updateDisplay();
}

function clearText(){
  text="";
  updateDisplay();
}

function speak(){
  if(!text) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang="nl-NL";
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function toggleSettings(){
  const s = document.getElementById("settings");
  s.style.display = s.style.display==="block"?"none":"block";
}

/* HOLD-TO-ACTIVATE */
function addHoldListener(button, callback){
  let timer;

  button.addEventListener("touchstart",()=>{
    timer=setTimeout(callback,holdTime);
  });

  button.addEventListener("touchend",()=>{
    clearTimeout(timer);
  });

  button.addEventListener("touchmove",()=>{
    clearTimeout(timer);
  });

  // Voor muis (tablet met stylus of desktop test)
  button.addEventListener("mousedown",()=>{
    timer=setTimeout(callback,holdTime);
  });

  button.addEventListener("mouseup",()=>{
    clearTimeout(timer);
  });
}

/* Toetsenbord genereren */
const letters="abcdefghijklmnopqrstuvwxyz";
letters.split("").forEach(l=>{
  const btn=document.createElement("button");
  btn.textContent=l;
  btn.className="key";
  keyboard.appendChild(btn);
  addHoldListener(btn,()=>addText(l));
});

const space=document.createElement("button");
space.textContent="Spatie";
space.className="key space";
keyboard.appendChild(space);
addHoldListener(space,()=>addText(" "));

/* Vaste woorden */
document.querySelectorAll(".phrases button").forEach(btn=>{
  addHoldListener(btn,()=>addText(btn.dataset.text));
});

updateDisplay();
</script>

</body>
</html>
