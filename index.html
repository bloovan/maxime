<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Maxime</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  background: #f4f6f8;
}

button {
  font-size: 18px;
  padding: 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
}

.primary { background: #1F6FEB; color: white; }
.gray { background: #777; color: white; }

.screen { display: none; height: 100%; }

#screen-profiles { padding: 20px; }

.profile-title {
  text-align: center;
  font-size: 32px;
  margin-bottom: 20px;
}

.profile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap: 20px;
}

.profile-card {
  background: white;
  border-radius: 20px;
  padding: 20px;
  text-align: center;
  font-size: 24px;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,.15);
}

.profile-delete {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #c62828;
  color: white;
  width: 36px;
  height: 36px;
  border-radius: 50%;
}

.profile-add {
  margin-top: 20px;
  width: 100%;
  font-size: 22px;
  background: #1F6FEB;
  color: white;
}

/* MAIN */
#screen-main {
  display: flex;
  flex-direction: column;
  height: 100%;
}

#display {
  background: white;
  padding: 10px 14px;
  font-size: 26px;
  border-bottom: 2px solid #ccc;
}

.middle {
  flex: 1;
  display: grid;
  grid-template-columns: 30% 70%;
}

.phrases {
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.phrases button {
  width: 100%;
  background: #2E7D32;
  color: white;
}

.keyboard {
  padding: 8px;
}

.keygroup {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.space-key button {
  width: 100%;
  font-size: 20px;
  background: linear-gradient(90deg,#42a5f5,#66bb6a);
  color: white;
}

.actions {
  background: #e0e0e0;
  padding: 8px;
  display: flex;
  gap: 8px;
  justify-content: space-around;
}

/* kleine visuele feedback bij hold */
button.holding {
  opacity: 0.6;
}

/* ================= KLEURRIJK TOETSENBORD ================= */

/* Algemene toets-stijl */
.keyboard button {
  font-weight: bold;
  color: #1a1a1a;
}



/* CIJFERS 0–9 */
.keyboard button:nth-child(n+27):nth-child(-n+36) {
  background: #90caf9;
  color: #0d47a1;
  font-size: 18px;
}

/* ================= ALS + DEMENTIE KLEUREN ================= */

/* Basis voor alle toetsen */
.keyboard button {
  font-weight: bold;
  color: #1a1a1a;
}

/* KLINKERS */
.keyboard button.vowel {
  background-color: #fff3b0; /* zacht geel */
}

/* MEDEKLINKERS */
.keyboard button.consonant {
  background-color: #cfe3f7; /* licht blauw */
}

/* CIJFERS */
.keyboard button.digit {
  background-color: #d9f2d9; /* licht groen */
  font-size: 18px;
}

/* Spatie blijft opvallend */
.space-key button {
  background: linear-gradient(90deg,#4fc3f7,#81c784);
  color: #ffffff;
}

/* HOLD visuele feedback (blijft) */
button.holding {
  filter: brightness(85%);
}

/* ================= HOOG-CONTRAST MODUS ================= */

body.high-contrast {
  background: #000;
  color: #fff;
}

/* Display */
body.high-contrast #display {
  background: #000;
  color: #fff;
  border-bottom: 2px solid #fff;
}

/* Algemeen: alle knoppen */
body.high-contrast button {
  color: #000;
  font-weight: bold;
  border: 2px solid #000;
}

/* Klinkers */
body.high-contrast .keyboard button.vowel {
  background: #ffff00; /* fel geel */
}

/* Medeklinkers */
body.high-contrast .keyboard button.consonant {
  background: #00bfff; /* fel blauw */
}

/* Cijfers */
body.high-contrast .keyboard button.digit {
  background: #00ff7f; /* fel groen */
}

/* Spatie */
body.high-contrast .space-key button {
  background: #ffffff;
  color: #000;
}

/* Vaste woorden */
body.high-contrast .phrases button {
  background: #ffffff;
  color: #000;
}

/* Actieknoppen */
body.high-contrast .actions button {
  background: #ffd700;
  color: #000;
}

/* Profielkaarten */
body.high-contrast .profile-card {
  background: #ffffff;
  color: #000;
}

/* ================= BOVENBALK INSTELLINGEN ================= */

#top-controls {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  padding: 10px;
  background: #dfe3e8;
  border-bottom: 2px solid #ccc;
}

#top-controls button {
  font-size: 14px;
  padding: 8px 14px;
  border-radius: 12px;
  background: #555;
  color: #fff;
}

/* Hoog-contrast aanpassing */
body.high-contrast #top-controls {
  background: #000;
  border-bottom: 2px solid #fff;
}

body.high-contrast #top-controls button {
  background: #ffd700;
  color: #000;
}

/* ================= TOETSENBORD STRUCTUUR ================= */

.keyboard {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.keygroup.letters {
  justify-content: space-between;
}

.keygroup.digits {
  justify-content: center;
  gap: 10px;
  margin-top: 6px;
  border-top: 2px solid #ccc;
  padding-top: 8px;
}

/* Extra scheiding in hoog-contrast modus */
body.high-contrast .keygroup.digits {
  border-top: 2px solid #fff;
}

/* ===== ZORG COMMUNICATIE ===== */

.title {
  text-align: center;
  font-size: 28px;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  height: calc(100% - 80px);
}

.tile {
  font-size: 26px;
  font-weight: bold;
  border: none;
  border-radius: 20px;
  padding: 30px;
  cursor: pointer;
  color: white;
}

.pijn { background: #e57373; }
.eten { background: #81c784; }
.toilet { background: #64b5f6; }
.familie { background: #9575cd; }
.moe { background: #ffb74d; }
.ja { background: #1CC7B0; }
.nee { background: #C71C31; }
.muziek { background: #b5f633; }

.sub { background: #546e7a; }

.back {
  grid-column: span 2;
  background: #455a64;
}

/* ===== SCHERM VERGRENDELING ===== */

body.locked {
  overflow: hidden;            /* voorkomt scroll */
  touch-action: none;          /* voorkomt gestures */
}

body.locked * {
  pointer-events: none;        /* blokkeert alle interactie */
}

/* Behalve het element dat wordt vastgehouden */
body.locked .holding {
  pointer-events: auto;
}

/* Muziekknoppen altijd klikbaar */
#zorg-muziek button {
  pointer-events: auto !important;
}

</style>
</head>

<body>

<div id="top-controls">
  <button onclick="toggleHighContrast()">Hoog contrast</button>
  <button onclick="goZorg()">Zorg Communicatie</button>
  <button onclick="goManage()">Beheer</button>
  <button onclick="goProfiles()">Profielen</button>
</div>


<!-- PROFIELEN -->
<div id="screen-profiles" class="screen">
  <div class="profile-title">Kies profiel</div>
  <div id="profileGrid" class="profile-grid"></div>
  <button class="profile-add" onclick="addProfile()">Nieuw profiel</button>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">
  <div id="display">...</div>

  <div class="middle">
    <div id="phrases" class="phrases"></div>

<div class="keyboard">

  <!-- LETTERS: RIJ 1 -->
  <div class="keygroup letters">
    <button>A</button><button>B</button><button>C</button>
    <button>D</button><button>E</button><button>F</button>
    <button>G</button><button>H</button><button>I</button>
    <button>J</button><button>K</button><button>L</button>
    <button>M</button>
  </div>

  <!-- LETTERS: RIJ 2 -->
  <div class="keygroup letters">
    <button>N</button><button>O</button><button>P</button>
    <button>Q</button><button>R</button><button>S</button>
    <button>T</button><button>U</button><button>V</button>
    <button>W</button><button>X</button><button>Y</button>
    <button>Z</button>
  </div>

  <!-- CIJFERS: APARTE RIJ -->
  <div class="keygroup digits">
    <button>1</button><button>2</button><button>3</button>
    <button>4</button><button>5</button><button>6</button>
    <button>7</button><button>8</button><button>9</button>
    <button>0</button>
  </div>

  <!-- SPATIE -->
  <div class="space-key">
    <button>Spatie</button>
  </div>

</div>
  </div>

  <div class="actions">
    <button class="primary" onclick="speak()">Spreek</button>
    <button class="gray" onclick="backspace()">Wis 1 letter</button>
    <button class="gray" onclick="clearText()">Wis alles</button>
  </div>
</div>

<!-- BEHEER -->
<div id="screen-manage" class="screen">
  <div style="padding:20px;">
    <h2>Beheer profiel: <span id="manageProfileName"></span></h2>
    <button class="primary" onclick="addPhrase()">+ Vast woord</button>
    <br><br>
    <select id="phraseSelect" style="width:100%; font-size:18px; padding:10px;"></select>
    <br><br>
    <button class="gray" onclick="removeSelectedPhrase()">Verwijder woord</button>
    <br><br><hr><br>
    <button onclick="goMain()">Terug</button>
    <button onclick="goProfiles()">Profielen</button>
  </div>
</div>

<!-- ZORG COMMUNICATIE -->
<div id="screen-zorg" class="screen">

  <div class="title">Wat heb je nodig?</div>

  <div class="grid">
    <button class="tile ja" onclick="speak('ja')">Ja</button>
    <button class="tile nee" onclick="speak('nee')">Nee</button>
    <button class="tile pijn" onclick="openZorgScreen('zorg-pijn')">Pijn</button>
    <button class="tile eten" onclick="openZorgScreen('zorg-voeding')">Eten / Drinken</button>
    <button class="tile toilet" onclick="speak('Ik moet naar het toilet')">Toilet</button>
    <button class="tile moe" onclick="speak('Ik ben moe')">Moe</button>
    <button class="tile familie" onclick="openZorgScreen('zorg-familie')">Familie</button>
    <button class="tile muziek" onclick="openZorgScreen('zorg-muziek')">Muziek</button>
  </div>

</div>

<div id="zorg-pijn" class="screen">
  <div class="title">Waar heb je pijn?</div>
  <div class="grid">
    <button class="tile sub" onclick="speak('Ik heb pijn aan mijn hoofd')">Hoofd</button>
    <button class="tile sub" onclick="speak('Ik heb pijn aan mijn buik')">Buik</button>
    <button class="tile sub" onclick="speak('Ik heb pijn aan mijn benen')">Benen</button>
    <button class="tile sub" onclick="speak('Ik heb pijn aan mijn rug')">Rug</button>
    <button class="tile sub" onclick="speak('Ik heb pijn aan mijn handen')">Handen</button>
    <button class="tile back" onclick="goZorg()">Terug</button>
  </div>
</div>

<div id="zorg-familie" class="screen">
  <div class="title">Wie komt er</div>
  <div class="grid">
    <button class="tile sub" onclick="speak('Mijn zoon komt')">Zoon</button>
    <button class="tile sub" onclick="speak('Mijn broer komt')">Broer</button>
    <button class="tile sub" onclick="speak('Mijn zus komt')">Zus</button>
    <button class="tile back" onclick="goZorg()">Terug</button>
  </div>
</div>

<div id="zorg-voeding" class="screen">
  <div class="title">Wat wil je eten of drinken</div>
  <div class="grid">
    <button class="tile sub" onclick="speak('Ik zou graag soep hebben')">Soep</button>
    <button class="tile sub" onclick="speak('Ik zou graag warme chocomelk hebben')">Choco</button>
    <button class="tile sub" onclick="speak('Ik zou graag een cola hebben')">Cola</button>
    <button class="tile sub" onclick="speak('Ik zou graag een lekkere koffie drinken')">Koffie</button>
    <button class="tile sub" onclick="speak('Ik zou graag een puddingske hebben')">Pudding</button>
    <button class="tile sub" onclick="speak('Ik zou graag een koekje hebben')">Koek</button>
    <button class="tile back" onclick="goZorg()">Terug</button>
  </div>
</div>

<div id="zorg-muziek" class="screen">
  <div class="title">Wat wil je horen</div>
  <div class="grid">
    <button class="tile sub" onclick="speak('Ik zou graag Christoff met Sweet Caroline horen')">Christoff Sweet Caroline</button>
	<button class="tile sub" data-music="media/Sweet Caroline - Neil Diamond.mp3">
	Sweet Caroline - Neil Diamond
	</button>
	<button class="tile back" onclick="goZorg()">Terug</button>
  </div>
</div>

<script>
/* ================= DATA ================= */
let profiles = [{ id: 1, name: "Eddy", phrases: ["Ik heb ", "Ik wil "] }];
let activeProfile = null;
let text = "";

/* ================= NAV ================= */
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s => s.style.display="none");
  document.getElementById(id).style.display="block";
}
function goProfiles(){ activeProfile=null; showScreen("screen-profiles"); }
function goMain(){ if(activeProfile) showScreen("screen-main"); }
function goManage(){
  if(!activeProfile) return;
  manageProfileName.textContent = activeProfile.name;
  updateSelect();
  showScreen("screen-manage");
}

/* ================= PROFIELEN ================= */
function renderProfiles(){
  profileGrid.innerHTML="";
  profiles.forEach(p=>{
    const c=document.createElement("div");
    c.className="profile-card";
    c.textContent=p.name;
    c.onclick=()=>loadProfile(p.id);

    const d=document.createElement("button");
    d.className="profile-delete";
    d.textContent="×";
    d.onclick=(e)=>{
      e.stopPropagation();
      deleteProfile(p.id);
    };
    c.appendChild(d);
    profileGrid.appendChild(c);
  });
}
function addProfile(){
  const n=prompt("Naam profiel:");
  if(!n) return;
  profiles.push({id:Date.now(), name:n, phrases:[]});
  renderProfiles();
}
function deleteProfile(id){
  profiles = profiles.filter(p => p.id!==id);
  renderProfiles();
}
function loadProfile(id){
  activeProfile = profiles.find(p=>p.id===id);
  text="";
  updateDisplay();
  renderPhrases();
  showScreen("screen-main");
}

/* ================= TEKST ================= */
const display = document.getElementById("display");
function updateDisplay(){ display.textContent = text || "..."; }
function addText(t){ text += t; updateDisplay(); }
function backspace(){ text = text.slice(0,-1); updateDisplay(); }
function clearText(){ text=""; updateDisplay(); }
function speak(spokenText = null) {
  let toSpeak = spokenText ?? text;

  if (!toSpeak) return;

  const utter = new SpeechSynthesisUtterance(toSpeak);
  utter.lang = "nl-NL";
  utter.rate = 0.9;
  utter.pitch = 1.1;

  const voice = getFemaleDutchVoice();
  if (voice) utter.voice = voice;

  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

function getFemaleDutchVoice() {
  const voices = speechSynthesis.getVoices();

  if (!voices || voices.length === 0) return null;

  // 1️⃣ Eerst: Nederlandse vrouwenstemmen
  let femaleDutch = voices.filter(v =>
    v.lang.startsWith("nl") &&
    /female|vrouw|eva|claire|ellen|fem|dutch/i.test(v.name)
  );
  if (femaleDutch.length) return femaleDutch[0];

  // 2️⃣ Dan: eender welke Nederlandse stem
  let anyDutch = voices.filter(v => v.lang.startsWith("nl"));
  if (anyDutch.length) return anyDutch[0];

  // 3️⃣ Dan: eender welke vrouwenstem
  let anyFemale = voices.filter(v =>
    /female|vrouw|eva|claire|ellen|fem/i.test(v.name)
  );
  if (anyFemale.length) return anyFemale[0];

  // 4️⃣ Fallback: eerste beschikbare stem
  return voices[0];
}

/* ================= WOORDEN ================= */
const phrasesDiv=document.getElementById("phrases");
function renderPhrases(){
  phrasesDiv.innerHTML="";
  activeProfile.phrases.forEach(p=>{
    const b=document.createElement("button");
    b.textContent=p.trim();
    setupHold(b, ()=>addText(p));
    phrasesDiv.appendChild(b);
  });
}
function addPhrase(){
  const p=prompt("Nieuw vast woord:");
  if(!p) return;
  activeProfile.phrases.push(p+" ");
  renderPhrases();
  updateSelect();
}
function updateSelect(){
  phraseSelect.innerHTML="";
  activeProfile.phrases.forEach((p,i)=>{
    const o=document.createElement("option");
    o.value=i; o.textContent=p.trim();
    phraseSelect.appendChild(o);
  });
}
function removeSelectedPhrase(){
  if(phraseSelect.value==="") return;
  activeProfile.phrases.splice(phraseSelect.value,1);
  renderPhrases();
  updateSelect();
}

/* ================= HOLD LOGICA (ALLEEN TOETSEN & PHRASES) ================= */
const HOLD_TIME = 600;

function setupHold(button, action){
  let timer=null;
  let fired=false;

  const start = e => {
  e.preventDefault();
  fired = false;
  lockScreen();                 // 🔒 HIER
  button.classList.add("holding");

  timer = setTimeout(() => {
    fired = true;
    button.classList.remove("holding");
    action();
    unlockScreen();             // 🔓 na actie
  }, HOLD_TIME);
};

const cancel = () => {
  clearTimeout(timer);
  button.classList.remove("holding");
  unlockScreen();               // 🔓 vinger los
};

  button.addEventListener("mousedown", start);
  button.addEventListener("mouseup", cancel);
  button.addEventListener("mouseleave", cancel);

  button.addEventListener("touchstart", start, {passive:false});
  button.addEventListener("touchend", cancel);
  button.addEventListener("touchcancel", cancel);

  button.addEventListener("click", e=>{
    e.preventDefault();
    e.stopPropagation();
  });
}

/* ================= TOETSENBORD ================= */
document.querySelectorAll(".keyboard button").forEach(b=>{
  const t=b.textContent;
  if(t==="Spatie"){
    setupHold(b,()=>addText(" "));
  } else if(/^[A-Z0-9]$/.test(t)){
    setupHold(b,()=>addText(t.toLowerCase()));
  }
});

/* ================= START ================= */
renderProfiles();
showScreen("screen-profiles");

/* ================= TOETS-KLEUR LOGICA ================= */

document.querySelectorAll(".keyboard button").forEach(btn => {
  const t = btn.textContent;

  if (/^[AEIOU]$/.test(t)) {
    btn.classList.add("vowel");
  } 
  else if (/^[A-Z]$/.test(t)) {
    btn.classList.add("consonant");
  } 
  else if (/^[0-9]$/.test(t)) {
    btn.classList.add("digit");
  }
});


/* ================= HOOG-CONTRAST TOGGLE ================= */

let highContrastEnabled = false;

function toggleHighContrast() {
  highContrastEnabled = !highContrastEnabled;
  document.body.classList.toggle("high-contrast", highContrastEnabled);
}

// Zorgt dat stemmen beschikbaar zijn vóór eerste spreekactie
speechSynthesis.onvoiceschanged = () => {
  getFemaleDutchVoice();
};

function goZorg() {
  showScreen("screen-zorg");
}

function openZorgScreen(id) {
  showScreen(id);
}

let screenLocked = false;

function lockScreen() {
  if (screenLocked) return;
  screenLocked = true;
  document.body.classList.add("locked");
}

function unlockScreen() {
  screenLocked = false;
  document.body.classList.remove("locked");
}

document.querySelectorAll('#zorg-muziek button[data-music]')
  .forEach(btn => {
    btn.addEventListener('click', () => {
      playLocalMusic(
        btn.textContent.trim(),
        btn.dataset.music
      );
    });
  });
  
  function playLocalMusic(title, file) {
  const player = document.getElementById("audioPlayer");

  if (!player) {
    console.error("audioPlayer niet gevonden");
    return;
  }

  console.log("Speel af:", title, file);

  player.pause();
  player.currentTime = 0;
  player.src = file;

  player.play().catch(err => {
    console.error("Audio play error:", err);
  });
}

</script>
<audio id="audioPlayer" preload="auto"></audio>
</body>
</html>
